<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diva Azerbaijan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

header{
  text-align:center;
  padding:30px;
  border-bottom:2px solid gold;
}

h1{color:gold;}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* SEARCH + FILTER */
.controls{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

input, select{
  padding:10px;
  border-radius:6px;
  border:none;
  outline:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  text-align:center;
  border:1px solid #333;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  border-radius:8px;
}

.price{
  color:gold;
  font-weight:bold;
}

.btn{
  background:gold;
  color:black;
  padding:10px 15px;
  text-decoration:none;
  border-radius:6px;
  display:inline-block;
  margin-top:10px;
  font-weight:bold;
}

.section-title{
  color:gold;
  margin-top:20px;
  border-bottom:1px solid gold;
  padding-bottom:10px;
}
</style>
</head>

<body>

<header>
  <h1>DIVA AZERBAIJAN</h1>
  <p>Elektronika • Məişət texnikası • Ətirlər</p>
</header>

<div class="container">

  <h2 class="section-title">Məhsullar</h2>

  <!-- SEARCH + FILTER -->
  <div class="controls">
    <input type="text" id="search" placeholder="Axtar...">
    <select id="category">
      <option value="">Hamısı</option>
    </select>
  </div>

  <div class="grid" id="products"></div>

</div>

<script>
let allProducts = [];

fetch('stok.csv')
  .then(res => res.text())
  .then(data => {

    const rows = data.split('\n').slice(1);

    rows.forEach(row => {
      if(!row.trim()) return;

      const cols = row.split(/[,;]/);

      allProducts.push({
        name: cols[1],
        price: cols[2],
        category: cols[3]
      });
    });

    renderProducts(allProducts);
    loadCategories();
  });

function renderProducts(products){
  let html = '';

  products.forEach(p => {
    html += `
      <div class="card">
        <img src="https://via.placeholder.com/300x220?text=${encodeURIComponent(p.name)}">
        <h3>${p.name}</h3>
        <p class="price">${p.price} AZN</p>
        <p>${p.category}</p>
        <a href="https://wa.me/994103750581?text=${encodeURIComponent('Salam, bu məhsul maraqlıdır: ' + p.name)}" target="_blank" class="btn">
          WhatsApp
        </a>
      </div>
    `;
  });

  document.getElementById('products').innerHTML = html;
}

/* SEARCH */
document.getElementById('search').addEventListener('input', function(){
  filterProducts();
});

/* CATEGORY FILTER */
document.getElementById('category').addEventListener('change', function(){
  filterProducts();
});

function filterProducts(){
  const search = document.getElementById('search').value.toLowerCase();
  const category = document.getElementById('category').value;

  const filtered = allProducts.filter(p => {
    return (
      p.name.toLowerCase().includes(search) &&
      (category === '' || p.category === category)
    );
  });

  renderProducts(filtered);
}

/* LOAD CATEGORIES */
function loadCategories(){
  const select = document.getElementById('category');
  const categories = [...new Set(allProducts.map(p => p.category))];

  categories.forEach(cat => {
    const option = document.createElement('option');
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}
</script>

</body>
</html>
